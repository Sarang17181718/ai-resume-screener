<!DOCTYPE html>
<html>
<head>
<title> AI Screening Results</title>
</head>

<body>

<h2>Top Ranked Candidates</h2>
<table border="1">

<tr>
<th>Rank</th>
<th>Resume</th>
<th>Semantic</th>
<th>Skills</th>
<th>Experience</th>
<th>Education</th>
<th>Final Score</th>
</tr>

{% for r in results %}

<tr>
<td>{{ loop.index }}</td>
<td>{{ r[0] }}</td>
<td>{{ r[1] }}</td>
<td>{{ r[2] }}</td>
<td>{{ r[3] }}</td>
<td>{{ r[4] }}</td>
<td>{{ r[5] }}</td>
</tr>

{% endfor %}

</table>
</body>
</html>
