<!DOCTYPE html>
<html>
<head>

<title>AI Screening Results</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:80%;
margin:auto;
margin-top:40px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
text-align:center;
}

th{
background:#007bff;
color:white;
}

tr:hover{
background:#f1f1f1;
}

.download-btn{
background:#28a745;
color:white;
padding:6px 12px;
border-radius:4px;
text-decoration:none;
}

.download-btn:hover{
background:#1e7e34;
}

.top-buttons{
margin-bottom:20px;
text-align:right;
}

.report-btn{
background:#ff9800;
color:white;
padding:10px 15px;
border-radius:5px;
text-decoration:none;
margin-left:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Top Ranked Candidates</h2>

<div class="top-buttons">

<a href="/download_top_zip" class="report-btn">
Download Top Candidates (ZIP)
</a>

<a href="/download_report" class="report-btn">
Download Full Report (CSV)
</a>

</div>

<table>

<tr>
<th>Rank</th>
<th>Resume</th>
<th>Final Score</th>
<th>Download</th>
<th>Name</th>
<th>Email</th>
<th>Phone</th>
<th>action</th>
</tr>

{% for r in results %}

<tr>

<td>{{ loop.index }}</td>

<td>{{ r[1] }}</td> <!-- Resume filename -->

<td>{{ r[6] | round(2) }}</td> <!-- Final Score -->

<td>
<a href="/download/{{ r[1] }}" class="download-btn">
Download
</a>
</td>

<td>{{ r[9] }}</td> <!-- Name -->

<td>{{ r[10] }}</td> <!-- Email -->

<td>{{ r[11] }}</td> <!-- Phone -->

<td>
    <a href="/shortlist/{{job_id}}/{{ r[0] }}">
        <button style="background:green;color:white;">Shortlist</button>
    </a>

    <a href="/reject/{{job_id}}/{{ r[0] }}">
        <button style="background:red;color:white;">Reject</button>
    </a>
</td>

</tr>

{% endfor %}

</table>

</div>
<h2>Candidate Score Chart</h2>
<canvas id="scoreChart" width="400" height="200"></canvas>
<script>

const data = {{ results | tojson }};

const resumes = data.map(function(r){
    return r[1];
});

const scores = data.map(function(r){
    return r[6];
});

const ctx = document.getElementById('scoreChart').getContext('2d');

new Chart(ctx, {
  type: 'bar',
  data: {
    labels: resumes,
    datasets: [{
      label: 'Candidate Score',
      data: scores,
      backgroundColor: 'rgba(54,162,235,0.6)',
      borderWidth: 1
    }]
  },
  options: {
    scales: {
      y: {
        beginAtZero: true
      }
    }
  }
});

</script>
</body>
</html>
