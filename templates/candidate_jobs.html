<!DOCTYPE html>
<html>

<head>

<title>Available Jobs</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:80%;
margin:auto;
margin-top:50px;
}

.job-card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
}

.job-title{
font-size:22px;
font-weight:bold;
}

.job-desc{
margin-top:10px;
color:#555;
}

.apply-btn{
margin-top:15px;
padding:10px 20px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Available Jobs</h2>

{% for job in jobs %}

<div class="job-card">

<div class="job-title">
{{ job[1] }}
</div>

<div class="job-desc">
{{ job[2] }}
</div>

<a href="/apply/{{job[0]}}">
<button class="apply-btn">Apply</button>
</a>

</div>

{% endfor %}

</div>

</body>

</html>
