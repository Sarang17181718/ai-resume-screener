<!DOCTYPE html>
<html>

<head>

<title>Candidate Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
width:70%;
margin:auto;
margin-top:80px;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
margin-top:20px;
padding:12px 25px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h2>Candidate Dashboard</h2>

<p>Welcome to the AI Recruitment Portal</p>

<a href="/candidate_jobs">
<button>Browse Available Jobs</button>
</a>
<h3 style="margin-top:40px;">My Applications</h3>

<table style="width:100%; margin-top:20px; border-collapse:collapse;">

<tr>
<th>Job</th>
<th>Status</th>
</tr>

{% for job, status in applications %}

<tr>
<td>{{ job }}</td>

<td style="
{% if status == 'shortlisted' %}
color:green;font-weight:bold;
{% elif status == 'rejected' %}
color:red;font-weight:bold;
{% else %}
color:orange;font-weight:bold;
{% endif %}
">
{{ status }}
</td>

</tr>

{% endfor %}

</table>
</div>

</div>

</body>

</html>
