<!DOCTYPE html>
<html>
<head>
<title>AI Resume Screener</title>
</head>
<body>

<h2>AI Resume Screening System</h2>

<form action="/upload" method="post" enctype="multipart/form-data">

    <label>Upload Job Description:</label><br>
    <textarea name="job_text" rows="10" cols="60"></textarea>

    <br><br>

    <label>Upload Resumes:</label>
    <input type="file" name="resumes[]" id="resumeUpload" multiple>
    <ul id="fileList"></ul>

    <br><br>

    <input type="submit" value="Run AI Screening">

</form>

<script>
document.getElementById("resumeUpload").addEventListener("change", function() {
    let list = document.getElementById("fileList");
    list.innerHTML = "";

    for (let i = 0; i < this.files.length; i++) {
        let li = document.createElement("li");
        li.textContent = this.files[i].name;
        list.appendChild(li);
    }
});
</script>

</body>
</html>
