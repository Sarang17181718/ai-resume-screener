<!DOCTYPE html>

<title>AI Resume Screener</title>
</head>

<body>

<h2>AI Resume Screening System</h2>

<label>Upload Job Description:</label><br>
<textarea name="job_text" rows="10" cols="50"></textarea>

<br><br>

<input type="submit" value="Run AI Screening">

</form>

</body>
